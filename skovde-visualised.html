<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skovde: Visualised</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    header {
      background: linear-gradient(135deg, #1e3a5f, #2563eb);
      color: white;
      padding: 42px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.2rem;
    }

    header p {
      margin: 10px 0 0;
      opacity: 0.9;
    }

    .container {
      width: 92%;
      max-width: 1100px;
      margin: 24px auto 36px;
    }

    .nav-links {
      margin-bottom: 16px;
    }

    .nav-links a {
      text-decoration: none;
      color: #1d4ed8;
      font-weight: 700;
    }

    #map {
      width: 100%;
      height: 72vh;
      min-height: 460px;
      border-radius: 14px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      border: 1px solid #dbe5f0;
    }

    .legend {
      margin-top: 14px;
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      border-left: 4px solid #2563eb;
    }
  </style>
</head>
<body>
  <header>
    <h1>Skovde: Visualised</h1>
    <p>An interactive map of where we spent our project week</p>
  </header>

  <div class="container">
    <div class="nav-links">
      <a href="./index.html">← Back to main blog</a>
    </div>

    <div id="map" aria-label="Interactive map of Skovde"></div>

    <div class="legend">
      Click a marker to see what we did there.
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const map = L.map("map").setView([58.3913, 13.8451], 14);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    const places = [
      {
        name: "University of Skovde",
        coords: [58.39405, 13.85462],
        info: "Monday to Friday - our main base for challenges, teamwork, and presentations."
      },
      {
        name: "Sushi Lunch Spot",
        coords: [58.3899918, 13.8476738],
        info: "we had lunch here many times with local students and tried different dishes."
      },
      {
        name: "Systembolaget",
        coords: [58.3906327, 13.8444125],
        info: "The main liquor store in Skovde."
      },
      {
        name: "Radhuscafeet",
        coords: [58.3904103, 13.8462342],
        info: "student cafe hangout before continuing the night in the city."
      },
      {
        name: "Movie Night Location",
        coords: [58.39405, 13.85482],
        info: 'Tuesday activity - we watched "WarGames" at the university campus.'
      },
      {
        name: "City Centre Walk",
        coords: [58.3896, 13.8454],
        info: "The main city square of Skovde, where we spent our time outside of the classroom."
      },
      {
        name: "Board Game Night",
        coords: [58.3881300, 13.8438110],
        info: "Monday evening board game night."
      }
    ];

    places.forEach((place) => {
      L.marker(place.coords)
        .addTo(map)
        .bindPopup(`<strong>${place.name}</strong><br>${place.info}`);
    });
  </script>
</body>
</html>
